<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>color flipper</title>
    <style>
      #green-btn {
        background-color: green;
      }
      #red-btn {
        background-color: red;
      }
      #blue-btn {
        background-color: blue;
      }
      button {
        border-radius: 0.3rem;
        border-width: 0.09rem;
      }
    </style>
  </head>
  <body>
    <div class="colour-button-container">
      <h1>Change colours</h1>
      <button class="colour-btns" id="red-btn">Red</button>
      <button class="colour-btns" id="green-btn">Green</button>
      <button class="colour-btns" id="blue-btn">Blue</button>
      <button class="colour-btns" id="random-btn">Random</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
